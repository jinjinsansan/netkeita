# Nginx location blocks for netkeita API
# Add these inside the server block for bot.dlogicai.in
#
# IMPORTANT: The SSE endpoint (/nk/api/chat/stream) requires a dedicated
# location block with proxy_buffering off and a long proxy_read_timeout.
# Without these, Nginx buffers the stream and real-time events are delayed
# or dropped, and connections are cut off after the default 60s timeout.

# ── 1. SSE endpoint (chat real-time stream) ───────────────────────────────────
location /nk/api/chat/stream {
    proxy_pass http://127.0.0.1:5002/api/chat/stream;

    # Required for SSE
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;   # 1 hour — keeps long-lived SSE connections alive

    # HTTP/1.1 chunked transfer (required for SSE)
    proxy_http_version 1.1;
    proxy_set_header Connection '';

    # Standard proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Tell upstream (FastAPI) not to buffer either
    add_header X-Accel-Buffering no;
}

# ── 2. All other netkeita API endpoints ───────────────────────────────────────
location /nk/ {
    rewrite ^/nk/(.*) /$1 break;
    proxy_pass http://127.0.0.1:5002;

    proxy_http_version 1.1;
    proxy_set_header Connection '';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 30s timeout is fine for regular API calls
    proxy_read_timeout 30s;
    proxy_connect_timeout 10s;
}
